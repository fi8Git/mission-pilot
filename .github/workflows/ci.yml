name: CI

on: 
    pull_request:
        branches: [main]
    push: 
        branches: [main]

permissions:
    contents: read

jobs:
    build-test:
        name: Build and test
        runs-on: ubuntu-latest

        steps:
        - name: Checkout
          uses: actions/checkout@v4

        - name: Setup .NET
          uses: actions/setup-dotnet@v4
          with:
            dotnet-version: '10.0.x'

        - name: Restore
          run: dotnet restore MissionPilot.sln

        - name: Build
          run: dotnet build MissionPilot.sln --configuration Release --no-restore

        - name: Test
          run: dotnet test MissionPilot.sln --configuration Release --no-build --verbosity normal

        - name: Format check
          run: dotnet format MissionPilot.sln --verify-no-changes --verbosity diagnostic